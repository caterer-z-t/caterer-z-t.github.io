<!-- Loading screen (hidden once model loads) -->
<div id="loading">
    <span id="loading-text">Loading...</span>
</div>

<!-- Click-to-enter overlay (shown when pointer is unlocked) -->
<div id="overlay">
    <h2>Issum — The Town on Capital Isle</h2>
    <p>Click anywhere to explore</p>
    <div id="controls-hint">
        <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>↑↓←→</kbd> Move</span>
        <span><kbd>Mouse</kbd> Look</span>
        <span><kbd>Shift</kbd> Sprint</span>
        <span><kbd>Space</kbd> Jump</span>
        <span><kbd>Esc</kbd> Pause</span>
    </div>
</div>

<script>
// Catch any JS errors (including module failures) and surface them on screen
function _showLoadError(msg) {
    var el = document.getElementById('loading-text');
    if (el) el.textContent = 'Error: ' + msg;
}
window.addEventListener('error', function(e) { _showLoadError(e.message || String(e)); });
window.addEventListener('unhandledrejection', function(e) { _showLoadError(String(e.reason)); });
</script>
